name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
      
      - run: npm ci

      - run: npm run test

      - run: npm run coverage

      - run: npm run build

      - name: Read coverage
        id: coverage
        run: |
          COVERAGE=$(jq '.total.lines.pct' coverage/coverage-final.json)
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
